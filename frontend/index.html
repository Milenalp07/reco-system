<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reco System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg"></div>

  <div class="layout">
    <aside class="sidebar">
      <div class="logo-box">
        <div class="logo-icon">R</div>
        <div>
          <h2>Reco</h2>
          <p>Entertainment Hub</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-type="all">Discover</button>
        <button class="nav-item" data-type="books">Books</button>
        <button class="nav-item" data-type="movies">Movies</button>
      </nav>

      <div class="sidebar-footer">
        <p>Desktop Experience</p>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <p class="tiny-label">WELCOME BACK</p>
          <h1>Find your next favorite</h1>
        </div>

        <div class="topbar-right">
          <div class="search-wrapper">
            <input
              type="text"
              id="searchInput"
              placeholder="Search books, movies, genre..."
            />
          </div>
        </div>
      </header>

      <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <span class="hero-tag">FEATURED COLLECTION</span>
          <h2>Books and movies in one premium space</h2>
          <p>
            Explore your recommendation system in a desktop dark interface with
            live search and category filters.
          </p>
        </div>
      </section>

      <section class="content-section">
        <div class="section-head">
          <div>
            <h2 id="sectionTitle">All Items</h2>
            <p class="section-subtitle">Your library</p>
          </div>
          <span id="resultsCount" class="result-pill">0 items</span>
        </div>

        <div id="cardsContainer" class="cards-grid"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
