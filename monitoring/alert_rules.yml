groups:
  - name: service_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.02
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.job }}"

      - alert: SlowAPI
        expr: histogram_quantile(0.95, http_request_duration_seconds_bucket{job="api"}) > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency exceeding 300ms SLO"